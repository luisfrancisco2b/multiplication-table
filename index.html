<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/app.js" defer></script>
</head>

<body>
    <!-- Main -->
    <main>
        <h2>Digite um número e confirme para gerar uma tabuada</h2>

        <!-- form -->
        <form id="multiplication-form">

            <!-- Número escolhido -->
            <div class="form-control">
                <label for="number">Tabuada do:</label>
                <input type="number" name="number" id="number" placeholder="3">
            </div>

            <!-- Multiplicador escolhido -->
            <div class="form-control">
                <label for="multiplicator">Multiplicar até:</label>
                <input type="number" name="multiplicator" id="multiplicator" placeholder="3" value="10">
            </div>

            <!-- Input de calcular -->
            <input type="submit" value="Calcular">
        </form>
    </main>

    <!-- Section -->
    <section>
        <!-- Texto do resultado -->
        <div class="multiplication-table">
            <h2 id="multiplication-title">Tabuada do número: <span></span></h2>

            <div id="multiplication-operations">
                <p>Informe um número para calcular a tabuada...</p>

                <div class="row">
                    <div class="operation">5 x 1 = </div>
                    <div class="result">5</div>
                </div>

                <div class="row">
                    <div class="operation">5 x 2 = </div>
                    <div class="result">10</div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
